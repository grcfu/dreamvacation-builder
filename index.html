<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Passport | Adventure Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="passport-container">
        <header>
            <h1>Digital Passport</h1>
            <p>Where is your dream destination?</p>
        </header>

        <section id="step-1" class="step">
            <input type="text" id="city-input" placeholder="Enter a city (e.g. Honolulu)">
            <button id="start-adventure">Start Adventure</button>
        </section>

        <div id="itinerary-display"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
